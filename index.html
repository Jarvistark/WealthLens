<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>资产管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0b0d14;--surface:#12151f;--card:#191d2b;--card-hover:#1f2436;
            --border:rgba(255,255,255,0.06);
            --accent:#c9a84c;--accent-dim:rgba(201,168,76,0.15);
            --text:#e8e6e0;--text-secondary:#8b8d97;--text-muted:#555766;
            --success:#22c55e;--success-bg:rgba(34,197,94,0.12);
            --danger:#ef4444;--danger-bg:rgba(239,68,68,0.12);
            --info:#3b82f6;--warning:#f59e0b;
            --sidebar-w:260px;--radius:12px;--radius-sm:8px;--bottom-h:0px;
        }
        html{font-size:14px;}
        body{
            font-family:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
            background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;
            padding-bottom:var(--bottom-h);
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse at 15% 20%,rgba(201,168,76,0.03) 0%,transparent 50%),
                        radial-gradient(ellipse at 85% 80%,rgba(59,130,246,0.02) 0%,transparent 50%);
            pointer-events:none;z-index:0;
        }

        /* ====== SIDEBAR ====== */
        .sidebar{
            position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);
            background:var(--surface);border-right:1px solid var(--border);
            display:flex;flex-direction:column;z-index:100;
        }
        .sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
        .sidebar-header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--accent)}
        .sidebar-header p{font-size:0.78rem;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace}
        .sidebar-nav{flex:1;padding:16px 12px}
        .nav-item{
            display:flex;align-items:center;gap:12px;padding:12px 16px;
            border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;
            font-size:0.92rem;transition:all 0.2s;margin-bottom:4px;user-select:none;
        }
        .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
        .nav-item.active{color:var(--accent);background:var(--accent-dim);font-weight:500}
        .nav-item .icon{font-size:1.15rem;width:24px;text-align:center}
        .sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted)}
        .sidebar-footer-btns{display:flex;gap:12px}

        /* ====== MOBILE BOTTOM NAV ====== */
        .bottom-nav{
            display:none;position:fixed;bottom:0;left:0;right:0;
            background:var(--surface);border-top:1px solid var(--border);
            z-index:200;padding:6px 0 env(safe-area-inset-bottom,8px);
        }
        .bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
        .bottom-nav-item{
            display:flex;flex-direction:column;align-items:center;gap:2px;
            padding:6px 0;cursor:pointer;color:var(--text-muted);
            font-size:0.62rem;transition:color 0.2s;user-select:none;min-width:56px;
        }
        .bottom-nav-item .bi-icon{font-size:1.25rem;line-height:1}
        .bottom-nav-item.active{color:var(--accent)}

        /* ====== MOBILE HEADER ====== */
        .mobile-top{
            display:none;position:sticky;top:0;z-index:90;
            background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;
        }
        .mobile-top-row{display:flex;justify-content:space-between;align-items:center}
        .mobile-top h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent)}
        .mobile-top-actions{display:flex;gap:8px;align-items:center}
        .mobile-top-actions .btn-icon{
            background:none;border:none;color:var(--text-secondary);
            font-size:1.2rem;cursor:pointer;padding:6px;border-radius:8px;
        }
        .mobile-top-actions .btn-icon:active{background:rgba(255,255,255,0.05)}

        /* ====== MAIN ====== */
        .main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;position:relative;z-index:1}
        .page{display:none;animation:fadeIn 0.3s ease}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
        .page-header h2{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:600}
        .page-header-actions{display:flex;gap:10px;flex-wrap:wrap}

        /* ====== STATS ====== */
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
        .stat-card{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
            padding:20px 22px;opacity:0;animation:fadeUp 0.5s ease forwards;
            transition:border-color 0.2s,transform 0.2s;
        }
        .stat-card:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-2px)}
        .stat-card:nth-child(1){animation-delay:0.05s}
        .stat-card:nth-child(2){animation-delay:0.1s}
        .stat-card:nth-child(3){animation-delay:0.15s}
        .stat-card:nth-child(4){animation-delay:0.2s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .stat-label{font-size:0.82rem;color:var(--text-secondary);margin-bottom:8px}
        .stat-value{font-family:'DM Mono',monospace;font-size:1.45rem;font-weight:500;letter-spacing:-0.02em}
        .stat-value.positive{color:var(--success)}
        .stat-value.negative{color:var(--danger)}
        .stat-sub{font-size:0.78rem;color:var(--text-muted);margin-top:6px;font-family:'DM Mono',monospace}

        /* ====== CHARTS ====== */
        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
        .chart-card{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
            padding:24px;opacity:0;animation:fadeUp 0.5s ease 0.25s forwards;
        }
        .chart-card h3{font-size:0.95rem;font-weight:500;color:var(--text-secondary);margin-bottom:20px}
        .chart-wrap{position:relative;height:280px}
        .chart-card-full{grid-column:1/-1}
        .chart-wrap-tall{height:240px}

        /* ====== TABLE ====== */
        .table-card{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
            overflow:hidden;opacity:0;animation:fadeUp 0.5s ease 0.3s forwards;
        }
        .table-card-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .table-card-header h3{font-size:0.95rem;font-weight:500;color:var(--text-secondary)}
        table{width:100%;border-collapse:collapse}
        thead th{
            padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:500;
            color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;
            border-bottom:1px solid var(--border);white-space:nowrap;
        }
        tbody td{padding:14px 16px;font-size:0.88rem;border-bottom:1px solid var(--border);white-space:nowrap}
        tbody tr{transition:background 0.15s}
        tbody tr:hover{background:rgba(255,255,255,0.02)}
        tbody tr:last-child td{border-bottom:none}

        /* ====== MOBILE CARD LIST ====== */
        .mobile-card-list{display:none;flex-direction:column;gap:12px}
        .m-card{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
            padding:16px;transition:border-color 0.15s;
        }
        .m-card:active{border-color:rgba(255,255,255,0.1)}
        .m-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
        .m-card-name{font-weight:500;font-size:0.95rem;line-height:1.3}
        .m-card-sub{font-size:0.75rem;color:var(--text-muted);margin-top:2px}
        .m-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
        .m-card-field .label{font-size:0.68rem;color:var(--text-muted);margin-bottom:2px}
        .m-card-field .value{font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:500}
        .m-card-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
        .m-card-actions .btn{flex:1;justify-content:center;padding:10px;font-size:0.82rem}

        .m-account-card{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
        }
        .m-account-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .m-account-name{font-weight:500;font-size:1rem}
        .m-account-value{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;margin-bottom:6px}
        .m-account-count{font-size:0.78rem;color:var(--text-muted)}
        .m-account-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

        .m-snapshot{
            background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;
        }
        .m-snapshot-title{font-weight:500;font-size:0.95rem;margin-bottom:4px}
        .m-snapshot-sub{font-size:0.75rem;color:var(--text-muted);margin-bottom:14px}
        .m-snapshot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .m-snapshot-grid .sf .label{font-size:0.68rem;color:var(--text-muted)}
        .m-snapshot-grid .sf .value{font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:500}
        .m-snapshot-del{margin-top:12px;text-align:right}

        /* ====== SHARED ====== */
        .mono{font-family:'DM Mono',monospace}
        .text-success{color:var(--success)}
        .text-danger{color:var(--danger)}
        .text-muted{color:var(--text-muted)}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:500;white-space:nowrap}
        .badge-stock{background:rgba(201,168,76,0.15);color:#c9a84c}
        .badge-fund{background:rgba(34,197,94,0.15);color:#22c55e}
        .badge-bond{background:rgba(59,130,246,0.15);color:#3b82f6}
        .badge-cash{background:rgba(52,211,153,0.15);color:#34d399}
        .badge-gold{background:rgba(251,191,36,0.15);color:#fbbf24}
        .badge-insurance{background:rgba(244,114,182,0.15);color:#f472b6}
        .badge-other{background:rgba(167,139,250,0.15);color:#a78bfa}

        /* ====== BUTTONS ====== */
        .btn{
            display:inline-flex;align-items:center;gap:6px;padding:9px 18px;
            border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;
            font-family:inherit;cursor:pointer;border:none;transition:all 0.2s;
        }
        .btn-primary{background:var(--accent);color:#0b0d14}
        .btn-primary:hover{background:#d4b35a;transform:translateY(-1px)}
        .btn-primary:active{transform:scale(0.97)}
        .btn-secondary{background:rgba(255,255,255,0.06);color:var(--text-secondary);border:1px solid var(--border)}
        .btn-secondary:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .btn-danger{background:rgba(239,68,68,0.12);color:var(--danger)}
        .btn-danger:hover{background:rgba(239,68,68,0.2)}
        .btn-sm{padding:5px 12px;font-size:0.78rem}
        .btn-ghost{
            background:none;border:none;color:var(--text-secondary);cursor:pointer;
            padding:4px 8px;font-size:0.82rem;border-radius:4px;font-family:inherit;transition:all 0.15s;
        }
        .btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.05)}
        .btn-ghost.danger:hover{color:var(--danger)}
        .btn-block{width:100%;justify-content:center}

        /* ====== FILTER ====== */
        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .filter-bar select{
            padding:8px 12px;background:var(--card);border:1px solid var(--border);
            border-radius:var(--radius-sm);color:var(--text);font-size:0.85rem;
            font-family:inherit;cursor:pointer;outline:none;
        }
        .filter-bar select option{background:var(--surface)}

        /* ====== MODAL ====== */
        .modal-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);
            display:flex;align-items:center;justify-content:center;
            z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s;
        }
        .modal-overlay.show{opacity:1;pointer-events:all}
        .modal{
            background:var(--surface);border:1px solid var(--border);border-radius:16px;
            padding:32px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;
            transform:scale(0.95) translateY(10px);transition:transform 0.25s;
        }
        .modal-overlay.show .modal{transform:scale(1) translateY(0)}
        .modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:24px}
        .form-group{margin-bottom:18px}
        .form-group label{display:block;font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{
            width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);
            border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;
            font-family:inherit;transition:border-color 0.2s;outline:none;-webkit-appearance:none;
        }
        .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
        .form-group select{cursor:pointer}
        .form-group select option{background:var(--surface)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
        .hint{font-size:0.75rem;color:var(--text-muted);margin-top:4px}

        .fetch-btn{
            background:none;border:1px solid var(--accent);color:var(--accent);
            padding:4px 10px;border-radius:4px;font-size:0.75rem;cursor:pointer;
            font-family:inherit;transition:all 0.15s;white-space:nowrap;
        }
        .fetch-btn:hover{background:var(--accent-dim)}
        .fetch-btn:disabled{opacity:0.5;cursor:not-allowed}

        /* ====== MARKET TABS ====== */
        .market-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:8px}
        .market-tab{
            flex:1;padding:7px 0;text-align:center;font-size:0.78rem;
            background:var(--card);color:var(--text-muted);cursor:pointer;
            border:none;font-family:inherit;transition:all 0.15s;
        }
        .market-tab:not(:last-child){border-right:1px solid var(--border)}
        .market-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:500}

        /* ====== TOAST ====== */
        #toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
        .toast{
            padding:12px 20px;border-radius:var(--radius-sm);font-size:0.85rem;color:white;
            animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;
            box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px;
        }
        .toast-success{background:#16a34a}
        .toast-error{background:#dc2626}
        .toast-info{background:#2563eb}
        @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
        .empty-state .icon{font-size:2.5rem;margin-bottom:16px}
        .empty-state p{margin-bottom:20px}

        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

        /* ====== RESPONSIVE ====== */
        @media(max-width:900px){
            :root{--bottom-h:64px}
            .sidebar{display:none}
            .main{margin-left:0;padding:16px 16px calc(64px + env(safe-area-inset-bottom,12px)) 16px}
            .mobile-top{display:block}
            .bottom-nav{display:block}
            .page-header{margin-bottom:16px}
            .page-header h2{font-size:1.2rem}
            .page-header-actions{width:100%}
            .page-header-actions .btn{flex:1;justify-content:center;padding:12px 16px}
            .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
            .stat-card{padding:14px 16px}
            .stat-label{font-size:0.72rem;margin-bottom:5px}
            .stat-value{font-size:1.2rem}
            .stat-sub{font-size:0.7rem;margin-top:3px}
            .charts-grid{grid-template-columns:1fr;gap:12px;margin-bottom:16px}
            .chart-card{padding:16px}
            .chart-wrap{height:220px}
            .chart-wrap-tall{height:200px}
            .table-card{display:none}
            .mobile-card-list{display:flex}
            .filter-bar{gap:8px}
            .filter-bar select{padding:10px 12px;font-size:0.82rem;flex:1;min-width:0}
            .accounts-grid{display:none}
            .snapshot-list{display:none}
            .m-snapshots-wrap{display:flex;flex-direction:column;gap:12px}
            .modal{
                width:100%;max-width:100%;max-height:100vh;border-radius:16px 16px 0 0;
                padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));
                position:fixed;bottom:0;left:0;right:0;transform:translateY(100%);
            }
            .modal-overlay.show .modal{transform:translateY(0)}
            .modal-overlay{align-items:flex-end;background:rgba(0,0,0,0.5)}
            .form-row{grid-template-columns:1fr;gap:10px}
            .form-group input,.form-group select{padding:12px 14px;font-size:16px}
            .form-actions .btn{flex:1;justify-content:center;padding:14px}
            #toast-container{top:12px;left:12px;right:12px}
            .toast{max-width:100%}
        }
        @media(min-width:901px){
            .mobile-card-list{display:none!important}
            .m-snapshots-wrap{display:none!important}
            .accounts-grid{display:grid}
            .snapshot-list{display:flex;flex-direction:column;gap:12px}
        }
        @media(max-width:500px){
            .stats-grid{grid-template-columns:1fr 1fr}
            .m-card-grid{grid-template-columns:1fr 1fr}
            .m-snapshot-grid{grid-template-columns:1fr 1fr}
        }
    </style>
</head>
<body>

<!-- ====== SIDEBAR ====== -->
<aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><h1>资产管家</h1><p>PERSONAL ASSETS</p></div>
    <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span> 总览</div>
        <div class="nav-item" data-page="holdings"><span class="icon">📋</span> 持仓管理</div>
        <div class="nav-item" data-page="accounts"><span class="icon">🏦</span> 账户管理</div>
        <div class="nav-item" data-page="liabilities"><span class="icon">💳</span> 负债管理</div>
        <div class="nav-item" data-page="snapshots"><span class="icon">📸</span> 历史快照</div>
    </nav>
    <div class="sidebar-footer">
        <div class="sidebar-footer-btns">
            <button class="btn-ghost" onclick="exportData()">📥 导出</button>
            <button class="btn-ghost" onclick="document.getElementById('import-file').click()">📤 导入</button>
            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
            <button class="btn-ghost danger" onclick="clearAllData()">🗑️</button>
        </div>
    </div>
</aside>

<!-- ====== MOBILE TOP ====== -->
<div class="mobile-top" id="mobile-top">
    <div class="mobile-top-row">
        <h1>资产管家</h1>
        <div class="mobile-top-actions"><button class="btn-icon" onclick="showMobileMenu()">⋯</button></div>
    </div>
</div>

<!-- ====== MOBILE BOTTOM NAV ====== -->
<nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav-inner">
        <div class="bottom-nav-item active" data-page="dashboard"><span class="bi-icon">📊</span>总览</div>
        <div class="bottom-nav-item" data-page="holdings"><span class="bi-icon">📋</span>持仓</div>
        <div class="bottom-nav-item" data-page="accounts"><span class="bi-icon">🏦</span>账户</div>
        <div class="bottom-nav-item" data-page="liabilities"><span class="bi-icon">💳</span>负债</div>
        <div class="bottom-nav-item" data-page="snapshots"><span class="bi-icon">📸</span>快照</div>
    </div>
</nav>

<!-- ====== MAIN ====== -->
<div class="main" id="main">

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
        <div class="page-header"><h2>资产总览</h2></div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="charts-grid">
            <div class="chart-card"><h3>资产分类占比</h3><div class="chart-wrap"><canvas id="chart-category"></canvas></div></div>

<script>
// ===================== CONSTANTS =====================
const CATEGORIES = {
    stock:{name:'股票',color:'#c9a84c',badge:'badge-stock'},
    fund:{name:'基金',color:'#22c55e',badge:'badge-fund'},
    bond:{name:'债券/理财',color:'#3b82f6',badge:'badge-bond'},
    cash:{name:'现金',color:'#34d399',badge:'badge-cash'},
    gold:{name:'黄金',color:'#fbbf24',badge:'badge-gold'},
    insurance:{name:'保险',color:'#f472b6',badge:'badge-insurance'},
    other:{name:'其他',color:'#a78bfa',badge:'badge-other'}
};
const ACCOUNT_TYPES = {brokerage:'证券账户',fund:'基金平台',bank:'银行',insurance:'保险',other:'其他'};
const MARKETS = {a:'A 股',hk:'港股',us:'美股'};

let state = {accounts:[],holdings:[],liabilities:[],snapshots:[]};
let chartInstances = {category:null,account:null,trend:null};

function isMobile(){return window.innerWidth<=900}

// ===================== DATA =====================
function loadState(){
    try{const s=localStorage.getItem('asset-tracker-data');if(s){state=JSON.parse(s)}else{loadDemoData()}}
    catch(e){loadDemoData()}
}
function saveState(){localStorage.setItem('asset-tracker-data',JSON.stringify(state))}
function loadDemoData(){
    state={
        accounts:[{id:'a1',name:'华泰证券',type:'brokerage'},{id:'a2',name:'天天基金',type:'fund'},{id:'a3',name:'招商银行',type:'bank'},{id:'a4',name:'支付宝',type:'other'}],
        holdings:[
            {id:'h1',accountId:'a1',category:'stock',name:'贵州茅台',code:'sh600519',shares:100,costPrice:1680,currentPrice:1725,note:''},
            {id:'h2',accountId:'a1',category:'stock',name:'腾讯控股',code:'hk00700',shares:200,costPrice:320,currentPrice:365,note:''},
            {id:'h3',accountId:'a1',category:'stock',name:'宁德时代',code:'sz300750',shares:200,costPrice:185,currentPrice:172,note:''},
            {id:'h4',accountId:'a2',category:'fund',name:'易方达蓝筹精选',code:'005827',shares:5000,costPrice:2.05,currentPrice:2.28,note:''},
            {id:'h5',accountId:'a2',category:'fund',name:'中欧医疗健康',code:'003095',shares:3000,costPrice:1.48,currentPrice:1.12,note:''},
            {id:'h6',accountId:'a3',category:'cash',name:'定期存款',code:'',shares:1,costPrice:150000,currentPrice:150000,note:'年化2.5%'},
            {id:'h7',accountId:'a4',category:'cash',name:'余额宝',code:'',shares:1,costPrice:82000,currentPrice:82000,note:''}
        ],
        liabilities:[{id:'l1',accountId:'a3',name:'住房贷款',amount:850000,interestRate:3.85,monthlyPayment:4200,note:'剩余22年'}],
        snapshots:[]
    };
    saveState();
}

// ===================== UTILITIES =====================
function genId(){return 'id_'+Date.now()+'_'+Math.random().toString(36).slice(2,8)}
function fmtMoney(v,compact=false){
    const sign=v<0?'-':'',a=Math.abs(v);
    if(compact){if(a>=1e8)return sign+'¥'+(a/1e8).toFixed(2)+'亿';if(a>=1e4)return sign+'¥'+(a/1e4).toFixed(2)+'万'}
    return sign+'¥'+a.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtPct(v){return (v>0?'+':'')+v.toFixed(2)+'%'}
function accName(id){const a=state.accounts.find(a=>a.id===id);return a?a.name:'未知'}
function totalAssets(){return state.holdings.reduce((s,h)=>s+h.shares*h.currentPrice,0)}
function totalCost(){return state.holdings.reduce((s,h)=>s+h.shares*h.costPrice,0)}
function totalLiabilities(){return state.liabilities.reduce((s,l)=>s+l.amount,0)}
function showToast(msg,type='success'){
    const c=document.getElementById('toast-container'),t=document.createElement('div');
    t.className='toast toast-'+type;t.textContent=msg;c.appendChild(t);setTimeout(()=>t.remove(),3000);
}

// ===================== CODE / MARKET HELPERS =====================
// 从存储的代码中提取市场和纯代码
function parseMarketCode(storedCode, category) {
    if (!storedCode) return { market: 'a', code: '' };
    const c = storedCode.toLowerCase();
    if (category === 'fund') return { market: 'fund', code: storedCode };
    if (c.startsWith('hk')) return { market: 'hk', code: storedCode.slice(2) };
    if (c.startsWith('us')) return { market: 'us', code: storedCode.slice(2) };
    if (c.startsWith('sh')) return { market: 'a', code: storedCode.slice(2) };
    if (c.startsWith('sz')) return { market: 'a', code: storedCode.slice(2) };
    return { market: 'a', code: storedCode };
}

// 根据市场和纯代码组装存储用的带前缀代码
function buildStoredCode(market, rawCode) {
    if (!rawCode) return '';
    if (market === 'hk') return 'hk' + rawCode.padStart(5, '0');
    if (market === 'us') return 'us' + rawCode.toUpperCase();
    // A股自动判断 sh/sz
    if (rawCode.startsWith('6') || rawCode.startsWith('9') || rawCode.startsWith('5')) return 'sh' + rawCode;
    return 'sz' + rawCode;
}

// ===================== NAVIGATION =====================
function navigate(page){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.querySelectorAll('.bottom-nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    const dn=document.querySelector(`.nav-item[data-page="${page}"]`);if(dn)dn.classList.add('active');
    const bn=document.querySelector(`.bottom-nav-item[data-page="${page}"]`);if(bn)bn.classList.add('active');
    switch(page){
        case'dashboard':renderDashboard();break;case'holdings':renderHoldings();break;
        case'accounts':renderAccounts();break;case'liabilities':renderLiabilities();break;
        case'snapshots':renderSnapshots();break;
    }
}

function showMobileMenu(){
    showModal(`<h2>设置</h2><div style="display:flex;flex-direction:column;gap:12px">
        <button class="btn btn-secondary btn-block" onclick="exportData();hideModal()">📥 导出数据</button>
        <button class="btn btn-secondary btn-block" onclick="document.getElementById('import-file').click();hideModal()">📤 导入数据</button>
        <button class="btn btn-danger btn-block" onclick="hideModal();setTimeout(clearAllData,200)">🗑️ 清空数据</button>
        <button class="btn btn-secondary btn-block" onclick="hideModal()">取消</button>
    </div>`);
}

function showModal(html){document.getElementById('modal-content').innerHTML=html;document.getElementById('modal-overlay').classList.add('show')}
function hideModal(){document.getElementById('modal-overlay').classList.remove('show')}

// ===================== DASHBOARD =====================
function renderDashboard(){
    const ta=totalAssets(),tl=totalLiabilities(),nw=ta-tl,tc=totalCost(),pnl=ta-tc,pP=tc>0?(pnl/tc*100):0;
    document.getElementById('stats-grid').innerHTML=`
        <div class="stat-card"><div class="stat-label">总资产</div><div class="stat-value">${fmtMoney(ta,true)}</div><div class="stat-sub">${state.holdings.length} 项持仓</div></div>
        <div class="stat-card"><div class="stat-label">总负债</div><div class="stat-value ${tl>0?'negative':''}">${fmtMoney(tl,true)}</div><div class="stat-sub">${state.liabilities.length} 项负债</div></div>
        <div class="stat-card"><div class="stat-label">净资产</div><div class="stat-value ${nw>=0?'positive':'negative'}">${fmtMoney(nw,true)}</div><div class="stat-sub">资产 - 负债</div></div>
        <div class="stat-card"><div class="stat-label">总收益</div><div class="stat-value ${pnl>=0?'positive':'negative'}">${fmtMoney(pnl,true)}</div><div class="stat-sub">${fmtPct(pP)}</div></div>`;
    renderCategoryChart();renderAccountChart();renderTrendChart();renderDashboardHoldings();
}

function renderCategoryChart(){
    if(chartInstances.category)chartInstances.category.destroy();
    const cat={};state.holdings.forEach(h=>{cat[h.category]=(cat[h.category]||0)+h.shares*h.currentPrice});
    chartInstances.category=new Chart(document.getElementById('chart-category'),{
        type:'doughnut',
        data:{labels:Object.keys(cat).map(k=>(CATEGORIES[k]||{name:k}).name),datasets:[{data:Object.values(cat),backgroundColor:Object.keys(cat).map(k=>(CATEGORIES[k]||{color:'#888'}).color),borderWidth:0,hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#8b8d97',font:{family:'Noto Sans SC',size:isMobile()?10:12},padding:isMobile()?10:16,usePointStyle:true,pointStyleWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmtMoney(ctx.raw,true)}}}}
    });
}
function renderAccountChart(){
    if(chartInstances.account)chartInstances.account.destroy();
    const acc={};state.holdings.forEach(h=>{const n=accName(h.accountId);acc[n]=(acc[n]||0)+h.shares*h.currentPrice});
    const pal=['#c9a84c','#22c55e','#3b82f6','#f472b6','#a78bfa','#fbbf24','#34d399','#fb923c'];
    chartInstances.account=new Chart(document.getElementById('chart-account'),{
        type:'doughnut',
        data:{labels:Object.keys(acc),datasets:[{data:Object.values(acc),backgroundColor:pal.slice(0,Object.keys(acc).length),borderWidth:0,hoverOffset:8}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'65%',plugins:{legend:{position:'bottom',labels:{color:'#8b8d97',font:{family:'Noto Sans SC',size:isMobile()?10:12},padding:isMobile()?10:16,usePointStyle:true,pointStyleWidth:10}},tooltip:{callbacks:{label:ctx=>ctx.label+': '+fmtMoney(ctx.raw,true)}}}}
    });
}
function renderTrendChart(){
    if(chartInstances.trend)chartInstances.trend.destroy();
    const ss=[...state.snapshots].sort((a,b)=>a.date.localeCompare(b.date));
    chartInstances.trend=new Chart(document.getElementById('chart-trend'),{
        type:'line',
        data:{labels:ss.length>0?ss.map(s=>s.date):['暂无数据'],datasets:[{label:'净资产',data:ss.length>0?ss.map(s=>s.netWorth):[0],borderColor:'#c9a84c',backgroundColor:'rgba(201,168,76,0.08)',fill:true,tension:0.4,pointRadius:ss.length>0?isMobile()?3:5:0,pointBackgroundColor:'#c9a84c',pointBorderColor:'#0b0d14',pointBorderWidth:2}]},
        options:{responsive:true,maintainAspectRatio:false,scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555766',font:{family:'DM Mono',size:isMobile()?9:11},maxRotation:isMobile()?45:0}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#555766',font:{family:'DM Mono',size:isMobile()?9:11},callback:v=>fmtMoney(v,true)}}},plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'净资产: '+fmtMoney(ctx.raw)}}}}
    });
}

function renderDashboardHoldings(){
    const sorted=[...state.holdings].sort((a,b)=>(b.shares*b.currentPrice)-(a.shares*a.currentPrice));
    const top=sorted.slice(0,isMobile()?6:8);
    const body=document.getElementById('dashboard-holdings-body');
    if(!top.length){body.innerHTML='<tr><td colspan="7" class="text-muted" style="text-align:center;padding:40px">暂无持仓</td></tr>'}
    else{body.innerHTML=top.map(h=>{const mv=h.shares*h.currentPrice,pnl=(h.currentPrice-h.costPrice)*h.shares,cat=CATEGORIES[h.category]||CATEGORIES.other;
        return `<tr><td><strong>${h.name}</strong></td><td><span class="badge ${cat.badge}">${cat.name}</span></td><td class="text-muted">${accName(h.accountId)}</td><td class="mono">${h.shares>1?h.shares.toLocaleString():'-'}</td><td class="mono">${fmtMoney(h.currentPrice)}</td><td class="mono">${fmtMoney(mv)}</td><td class="mono ${pnl>=0?'text-success':'text-danger'}">${fmtMoney(pnl,true)}</td></tr>`}).join('')}
    const mc=document.getElementById('dashboard-mobile-cards');
    if(!top.length){mc.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>暂无持仓</p></div>';return}
    mc.innerHTML=top.map(h=>{const mv=h.shares*h.currentPrice,pnl=(h.currentPrice-h.costPrice)*h.shares,pP=h.costPrice>0?((h.currentPrice-h.costPrice)/h.costPrice*100):0,cat=CATEGORIES[h.category]||CATEGORIES.other;
        return `<div class="m-card"><div class="m-card-top"><div><div class="m-card-name">${h.name}</div><div class="m-card-sub">${accName(h.accountId)}</div></div><span class="badge ${cat.badge}">${cat.name}</span></div><div class="m-card-grid"><div class="m-card-field"><div class="label">市值</div><div class="value">${fmtMoney(mv,true)}</div></div><div class="m-card-field"><div class="label">现价</div><div class="value">${fmtMoney(h.currentPrice)}</div></div><div class="m-card-field"><div class="label">盈亏</div><div class="value ${pnl>=0?'text-success':'text-danger'}">${fmtMoney(pnl,true)}</div></div><div class="m-card-field"><div class="label">收益率</div><div class="value ${pP>=0?'text-success':'text-danger'}">${fmtPct(pP)}</div></div></div></div>`}).join('');
}

// ===================== HOLDINGS =====================
function renderHoldings(){
    const fa=document.getElementById('filter-account'),cv=fa.value;
    fa.innerHTML='<option value="">全部账户</option>'+state.accounts.map(a=>`<option value="${a.id}" ${a.id===cv?'selected':''}>${a.name}</option>`).join('');
    const af=fa.value,cf=document.getElementById('filter-category').value;
    let f=state.holdings;if(af)f=f.filter(h=>h.accountId===af);if(cf)f=f.filter(h=>h.category===cf);

    const body=document.getElementById('holdings-body');
    if(!f.length){body.innerHTML='<tr><td colspan="11" class="text-muted" style="text-align:center;padding:40px">暂无持仓</td></tr>'}
    else{body.innerHTML=f.map(h=>{const mv=h.shares*h.currentPrice,pnl=(h.currentPrice-h.costPrice)*h.shares,pP=h.costPrice>0?((h.currentPrice-h.costPrice)/h.costPrice*100):0,cat=CATEGORIES[h.category]||CATEGORIES.other;
        return `<tr><td><strong>${h.name}</strong></td><td class="mono text-muted">${h.code||'-'}</td><td><span class="badge ${cat.badge}">${cat.name}</span></td><td class="text-muted">${accName(h.accountId)}</td><td class="mono">${h.shares>1?h.shares.toLocaleString():'-'}</td><td class="mono">${fmtMoney(h.costPrice)}</td><td class="mono">${fmtMoney(h.currentPrice)}</td><td class="mono"><strong>${fmtMoney(mv)}</strong></td><td class="mono ${pnl>=0?'text-success':'text-danger'}">${fmtMoney(pnl,true)}</td><td class="mono ${pP>=0?'text-success':'text-danger'}">${fmtPct(pP)}</td><td><button class="btn-ghost" onclick="showHoldingModal('${h.id}')">编辑</button> <button class="btn-ghost danger" onclick="deleteHolding('${h.id}')">删除</button></td></tr>`}).join('')}

    const mc=document.getElementById('holdings-mobile-cards');
    if(!f.length){mc.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>暂无持仓</p></div>';return}
    mc.innerHTML=f.map(h=>{const mv=h.shares*h.currentPrice,pnl=(h.currentPrice-h.costPrice)*h.shares,pP=h.costPrice>0?((h.currentPrice-h.costPrice)/h.costPrice*100):0,cat=CATEGORIES[h.category]||CATEGORIES.other;
        return `<div class="m-card"><div class="m-card-top"><div><div class="m-card-name">${h.name}${h.code?' <span class="text-muted" style="font-size:0.72rem">'+h.code+'</span>':''}</div><div class="m-card-sub">${accName(h.accountId)}${h.note?' · '+h.note:''}</div></div><span class="badge ${cat.badge}">${cat.name}</span></div><div class="m-card-grid"><div class="m-card-field"><div class="label">数量</div><div class="value">${h.shares>1?h.shares.toLocaleString():'-'}</div></div><div class="m-card-field"><div class="label">成本价</div><div class="value">${fmtMoney(h.costPrice)}</div></div><div class="m-card-field"><div class="label">现价</div><div class="value">${fmtMoney(h.currentPrice)}</div></div><div class="m-card-field"><div class="label">市值</div><div class="value"><strong>${fmtMoney(mv)}</strong></div></div><div class="m-card-field"><div class="label">盈亏</div><div class="value ${pnl>=0?'text-success':'text-danger'}">${fmtMoney(pnl,true)}</div></div><div class="m-card-field"><div class="label">收益率</div><div class="value ${pP>=0?'text-success':'text-danger'}">${fmtPct(pP)}</div></div></div><div class="m-card-actions"><button class="btn btn-secondary" onclick="showHoldingModal('${h.id}')">编辑</button><button class="btn btn-danger" onclick="deleteHolding('${h.id}')">删除</button></div></div>`}).join('');
}

function showHoldingModal(id){

    showModal(`

            </div>

                <div class="form-group"><label>代码</label>
                    <div id="code-section">
                        <div class="market-tabs" id="market-tabs" style="display:${showMarketTabs?'flex':'none'}">
                            <button type="button" class="market-tab ${curMarket==='a'?'active':''}" data-market="a" onclick="selectMarket('a')">A 股</button>
                            <button type="button" class="market-tab ${curMarket==='hk'?'active':''}" data-market="hk" onclick="selectMarket('hk')">港股</button>
                            <button type="button" class="market-tab ${curMarket==='us'?'active':''}" data-market="us" onclick="selectMarket('us')">美股</button>
                        </div>

// ===================== PRICE FETCHING (多源自动降级) =====================
// 股票: 腾讯行情(script标签) → 东方财富(CORS代理)
// 基金: 天天基金JSONP → 东方财富基金(CORS代理)

const CORS_PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
];

async function proxyFetch(url) {
    for (const proxy of CORS_PROXIES) {
        try {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), 6000);
            const resp = await fetch(proxy + encodeURIComponent(url), { signal: controller.signal });
            clearTimeout(timer);
            if (resp.ok) return await resp.text();
        } catch (e) { continue; }
    }
    throw new Error('所有代理均不可用');
}

// 归一化股票代码
function normStockCode(code, market) {
    let c = code.toLowerCase().replace(/^(sh|sz|hk|us)/, '');
    if (market === 'hk') return 'hk' + c.padStart(5, '0');
    if (market === 'us') return 'us' + c.toUpperCase();
    // A股: 6/9/5/11/13开头 → 上海, 其他 → 深圳
    if (/^[695]/.test(c) || c.startsWith('11') || c.startsWith('13')) return 'sh' + c;
    return 'sz' + c;
}

// ---- 基金净值 ----
async function fetchFundNav(code) {
    // 主源: 天天基金 JSONP (实时估值)
    try {
        return await _fundFromTiantian(code);
    } catch (e) {
        console.warn('[天天基金]', e.message);
    }
    // 备用: 天天基金 via CORS 代理
    try {
        return await _fundFromProxy(code);
    } catch (e) {
        console.warn('[基金代理]', e.message);
    }
    throw new Error('基金数据获取失败，请手动输入净值');
}

function _fundFromTiantian(code) {
    return new Promise((resolve, reject) => {
        const oldCb = window.jsonpgz;
        const s = document.createElement('script');
        const t = setTimeout(() => { cl(); reject(new Error('超时')); }, 8000);
        function cl() {
            clearTimeout(t); s.remove();
            if (oldCb) window.jsonpgz = oldCb; else delete window.jsonpgz;
        }
        window.jsonpgz = d => {
            cl();
            if (d && d.dwjz) resolve({ name: d.name, code: d.fundcode, nav: parseFloat(d.dwjz) });
            else reject(new Error('格式错误'));
        };
        s.src = `https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;
        s.onerror = () => { cl(); reject(new Error('网络错误')); };
        document.head.appendChild(s);
    });
}

async function _fundFromProxy(code) {
    const text = await proxyFetch(`https://fundgz.1234567.com.cn/js/${code}.js`);
    const m = text.match(/jsonpgz$$(.+)$$/);
    if (m) {
        const d = JSON.parse(m[1]);
        if (d.dwjz) return { name: d.name, code: d.fundcode, nav: parseFloat(d.dwjz) };
    }
    throw new Error('解析失败');
}

// ---- 股票价格 ----
async function fetchStockPrice(code, market) {
    // 主源: 腾讯行情 (script标签注入, 无CORS限制)
    try {
        return await _stockFromTencent(code, market);
    } catch (e) {
        console.warn('[腾讯行情]', e.message);
    }
    // 备用: 东方财富 (通过CORS代理)
    try {
        return await _stockFromEastMoney(code, market);
    } catch (e) {
        console.warn('[东方财富]', e.message);
    }
    throw new Error('股票数据获取失败，请手动输入价格');
}

function _stockFromTencent(code, market) {
    const fc = normStockCode(code, market);
    return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        const vn = 'v_' + fc;
        const t = setTimeout(() => { s.remove(); reject(new Error('超时')); }, 8000);
        s.src = `https://qt.gtimg.cn/q=${fc}`;
        s.onload = () => {
            clearTimeout(t);
            const raw = window[vn];
            s.remove(); delete window[vn];
            if (raw && typeof raw === 'string' && raw.length > 10) {
                const p = raw.split('~');
                if (p.length > 5 && p[3] && !isNaN(parseFloat(p[3]))) {
                    resolve({ name: p[1], code: p[2], price: parseFloat(p[3]) });
                    return;
                }
            }
            reject(new Error('解析失败'));
        };
        s.onerror = () => { clearTimeout(t); s.remove(); reject(new Error('网络错误')); };
        document.head.appendChild(s);
    });
}

async function _stockFromEastMoney(code, market) {
    let secid;
    if (market === 'hk') {
        secid = '116.' + code.replace(/^hk/i, '');
    } else if (market === 'us') {
        secid = '105.' + code.replace(/^us/i, '').toUpperCase();
    } else {
        const c = code.replace(/^(sh|sz)/i, '');
        secid = (/^[695]/.test(c) || c.startsWith('11') || c.startsWith('13') ? '1' : '0') + '.' + c;
    }
    const url = `https://push2.eastmoney.com/api/qt/stock/get?secid=${secid}&fields=f43,f57,f58&ut=fa5fd1943c7b386f172d6893dbbd1d0c`;
    const text = await proxyFetch(url);
    const json = JSON.parse(text);
    if (json?.data?.f43) {
        let price = json.data.f43;
        // 东方财富: A股/港股返回值单位为"分"，需除以100；美股为"美分"
        if (price > 500) price = price / 100;
        return { name: json.data.f58, code: json.data.f57, price };
    }
    throw new Error('无数据');
}

// ---- 一键更新 ----
async function updateAllPrices() {
    const wc = state.holdings.filter(h => h.code);
    if (!wc.length) { showToast('没有可更新的持仓（需填写代码）', 'info'); return; }

    showToast(`正在更新 ${wc.length} 项...`, 'info');
    let ok = 0, fail = 0, names = [];

    for (const h of wc) {
        try {
            if (h.category === 'fund') {
                const d = await fetchFundNav(h.code);
                h.currentPrice = d.nav;
                if (d.name) h.name = d.name; // 顺便更新名称
            } else {
                const { market } = parseMarketCode(h.code, h.category);
                const d = await fetchStockPrice(h.code, market);
                h.currentPrice = d.price;
            }
            ok++;
        } catch (e) {
            fail++;
            names.push(h.name);
        }
    }

    saveState();
    renderHoldings();
    if (fail === 0) {
        showToast(`全部 ${ok} 项更新成功`, 'success');
    } else {
        showToast(`${ok} 成功, ${fail} 失败${names.length ? '（' + names.join('、') + '）' : ''}`, ok > 0 ? 'info' : 'error');
    }
}

function importData(e){
    const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.accounts&&d.holdings){state=d;saveState();navigate('dashboard');showToast('导入成功')}else showToast('无效文件','error')}catch(err){showToast('解析失败','error')}};
    r.readAsText(f);e.target.value='';
}
function clearAllData(){if(!confirm('确定清空所有数据？'))return;if(!confirm('再次确认？'))return;localStorage.removeItem('asset-tracker-data');loadDemoData();navigate('dashboard');showToast('已重置','info')}

// ===================== INIT =====================
document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',()=>navigate(i.dataset.page)));
document.querySelectorAll('.bottom-nav-item').forEach(i=>i.addEventListener('click',()=>navigate(i.dataset.page)));
let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{const p=document.querySelector('.page.active');if(p){const pg=p.id.replace('page-','');if(pg==='dashboard')renderDashboard()}},300)});
loadState();renderDashboard();
</script>
</body>
</html>
