<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>资产管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{
            --bg:#0b0d14;--surface:#12151f;--card:#191d2b;--card-hover:#1f2436;
            --border:rgba(255,255,255,0.06);
            --accent:#c9a84c;--accent-dim:rgba(201,168,76,0.15);
            --text:#e8e6e0;--text-secondary:#8b8d97;--text-muted:#555766;
            --success:#22c55e;--success-bg:rgba(34,197,94,0.12);
            --danger:#ef4444;--danger-bg:rgba(239,68,68,0.12);
            --info:#3b82f6;--warning:#f59e0b;
            --sidebar-w:260px;--radius:12px;--radius-sm:8px;--bottom-h:0px;
        }
        html{font-size:14px}
        body{font-family:'Noto Sans SC',-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden;padding-bottom:var(--bottom-h)}
        body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 20%,rgba(201,168,76,0.03) 0%,transparent 50%),radial-gradient(ellipse at 85% 80%,rgba(59,130,246,0.02) 0%,transparent 50%);pointer-events:none;z-index:0}

        .sidebar{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100}
        .sidebar-header{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
        .sidebar-header h1{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--accent)}
        .sidebar-header p{font-size:0.78rem;color:var(--text-muted);margin-top:4px;font-family:'DM Mono',monospace}
        .sidebar-nav{flex:1;padding:16px 12px}
        .nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:var(--radius-sm);color:var(--text-secondary);cursor:pointer;font-size:0.92rem;transition:all 0.2s;margin-bottom:4px;user-select:none}
        .nav-item:hover{color:var(--text);background:rgba(255,255,255,0.03)}
        .nav-item.active{color:var(--accent);background:var(--accent-dim);font-weight:500}
        .nav-item .icon{font-size:1.15rem;width:24px;text-align:center}
        .sidebar-footer{padding:16px 24px;border-top:1px solid var(--border);font-size:0.75rem;color:var(--text-muted)}
        .sidebar-footer-btns{display:flex;gap:12px}

        .bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:200;padding:6px 0 env(safe-area-inset-bottom,8px)}
        .bottom-nav-inner{display:flex;justify-content:space-around;align-items:center}
        .bottom-nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 0;cursor:pointer;color:var(--text-muted);font-size:0.62rem;transition:color 0.2s;user-select:none;min-width:56px}
        .bottom-nav-item .bi-icon{font-size:1.25rem;line-height:1}
        .bottom-nav-item.active{color:var(--accent)}

        .mobile-top{display:none;position:sticky;top:0;z-index:90;background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px}
        .mobile-top-row{display:flex;justify-content:space-between;align-items:center}
        .mobile-top h1{font-family:'Playfair Display',serif;font-size:1.2rem;color:var(--accent)}
        .mobile-top-actions{display:flex;gap:8px;align-items:center}
        .mobile-top-actions .btn-icon{background:none;border:none;color:var(--text-secondary);font-size:1.2rem;cursor:pointer;padding:6px;border-radius:8px}
        .mobile-top-actions .btn-icon:active{background:rgba(255,255,255,0.05)}

        .main{margin-left:var(--sidebar-w);padding:32px 36px;min-height:100vh;position:relative;z-index:1}
        .page{display:none;animation:fadeIn 0.3s ease}
        .page.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px}
        .page-header h2{font-family:'Playfair Display',serif;font-size:1.65rem;font-weight:600}
        .page-header-actions{display:flex;gap:10px;flex-wrap:wrap}

        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
        .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;opacity:0;animation:fadeUp 0.5s ease forwards;transition:border-color 0.2s,transform 0.2s}
        .stat-card:hover{border-color:rgba(255,255,255,0.1);transform:translateY(-2px)}
        .stat-card:nth-child(1){animation-delay:0.05s}.stat-card:nth-child(2){animation-delay:0.1s}.stat-card:nth-child(3){animation-delay:0.15s}.stat-card:nth-child(4){animation-delay:0.2s}.stat-card:nth-child(5){animation-delay:0.25s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .stat-label{font-size:0.82rem;color:var(--text-secondary);margin-bottom:8px}
        .stat-value{font-family:'DM Mono',monospace;font-size:1.45rem;font-weight:500;letter-spacing:-0.02em}
        .stat-value.positive{color:var(--success)}.stat-value.negative{color:var(--danger)}
        .stat-sub{font-size:0.78rem;color:var(--text-muted);margin-top:6px;font-family:'DM Mono',monospace}

        .charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:28px}
        .chart-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;opacity:0;animation:fadeUp 0.5s ease 0.25s forwards}
        .chart-card h3{font-size:0.95rem;font-weight:500;color:var(--text-secondary);margin-bottom:20px}
        .chart-wrap{position:relative;height:280px}
        .chart-card-full{grid-column:1/-1}.chart-wrap-tall{height:240px}

        .table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;opacity:0;animation:fadeUp 0.5s ease 0.3s forwards}
        .table-card-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .table-card-header h3{font-size:0.95rem;font-weight:500;color:var(--text-secondary)}
        table{width:100%;border-collapse:collapse}
        thead th{padding:12px 16px;text-align:left;font-size:0.78rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);white-space:nowrap}
        tbody td{padding:14px 16px;font-size:0.88rem;border-bottom:1px solid var(--border);white-space:nowrap}
        tbody tr{transition:background 0.15s}tbody tr:hover{background:rgba(255,255,255,0.02)}tbody tr:last-child td{border-bottom:none}

        .mobile-card-list{display:none;flex-direction:column;gap:12px}
        .m-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:border-color 0.15s}
        .m-card:active{border-color:rgba(255,255,255,0.1)}
        .m-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
        .m-card-name{font-weight:500;font-size:0.95rem;line-height:1.3}
        .m-card-sub{font-size:0.75rem;color:var(--text-muted);margin-top:2px}
        .m-card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 16px}
        .m-card-field .label{font-size:0.68rem;color:var(--text-muted);margin-bottom:2px}
        .m-card-field .value{font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:500}
        .m-card-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}
        .m-card-actions .btn{flex:1;justify-content:center;padding:10px;font-size:0.82rem}

        .m-account-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
        .m-account-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
        .m-account-name{font-weight:500;font-size:1rem}
        .m-account-value{font-family:'DM Mono',monospace;font-size:1.3rem;font-weight:500;margin-bottom:6px}
        .m-account-count{font-size:0.78rem;color:var(--text-muted)}
        .m-account-actions{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--border)}

        .m-snapshot{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
        .m-snapshot-title{font-weight:500;font-size:0.95rem;margin-bottom:4px}
        .m-snapshot-sub{font-size:0.75rem;color:var(--text-muted);margin-bottom:14px}
        .m-snapshot-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
        .m-snapshot-grid .sf .label{font-size:0.68rem;color:var(--text-muted)}
        .m-snapshot-grid .sf .value{font-family:'DM Mono',monospace;font-size:0.88rem;font-weight:500}
        .m-snapshot-del{margin-top:12px;text-align:right}

        .mono{font-family:'DM Mono',monospace}.text-success{color:var(--success)}.text-danger{color:var(--danger)}.text-muted{color:var(--text-muted)}
        .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:0.72rem;font-weight:500;white-space:nowrap}
        .badge-stock{background:rgba(201,168,76,0.15);color:#c9a84c}.badge-fund{background:rgba(34,197,94,0.15);color:#22c55e}
        .badge-bond{background:rgba(59,130,246,0.15);color:#3b82f6}.badge-cash{background:rgba(52,211,153,0.15);color:#34d399}
        .badge-gold{background:rgba(251,191,36,0.15);color:#fbbf24}.badge-insurance{background:rgba(244,114,182,0.15);color:#f472b6}
        .badge-other{background:rgba(167,139,250,0.15);color:#a78bfa}

        .btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;font-family:inherit;cursor:pointer;border:none;transition:all 0.2s}
        .btn-primary{background:var(--accent);color:#0b0d14}.btn-primary:hover{background:#d4b35a;transform:translateY(-1px)}.btn-primary:active{transform:scale(0.97)}
        .btn-secondary{background:rgba(255,255,255,0.06);color:var(--text-secondary);border:1px solid var(--border)}.btn-secondary:hover{background:rgba(255,255,255,0.1);color:var(--text)}
        .btn-danger{background:rgba(239,68,68,0.12);color:var(--danger)}.btn-danger:hover{background:rgba(239,68,68,0.2)}
        .btn-warning{background:rgba(245,158,11,0.12);color:var(--warning)}.btn-warning:hover{background:rgba(245,158,11,0.2)}
        .btn-sm{padding:5px 12px;font-size:0.78rem}
        .btn-ghost{background:none;border:none;color:var(--text-secondary);cursor:pointer;padding:4px 8px;font-size:0.82rem;border-radius:4px;font-family:inherit;transition:all 0.15s}
        .btn-ghost:hover{color:var(--text);background:rgba(255,255,255,0.05)}.btn-ghost.danger:hover{color:var(--danger)}.btn-ghost.warning:hover{color:var(--warning)}
        .btn-block{width:100%;justify-content:center}

        .filter-bar{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
        .filter-bar select{padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.85rem;font-family:inherit;cursor:pointer;outline:none}
        .filter-bar select option{background:var(--surface)}

        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;pointer-events:none;transition:opacity 0.25s}
        .modal-overlay.show{opacity:1;pointer-events:all}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;transform:scale(0.95) translateY(10px);transition:transform 0.25s}
        .modal-overlay.show .modal{transform:scale(1) translateY(0)}
        .modal h2{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:24px}
        .form-group{margin-bottom:18px;position:relative}
        .form-group label{display:block;font-size:0.82rem;color:var(--text-secondary);margin-bottom:6px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:11px 14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:0.9rem;font-family:inherit;transition:border-color 0.2s;outline:none;-webkit-appearance:none}
        .form-group input:focus,.form-group select:focus{border-color:var(--accent)}
        .form-group select{cursor:pointer}.form-group select option{background:var(--surface)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
        .form-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:28px;padding-top:20px;border-top:1px solid var(--border)}
        .hint{font-size:0.75rem;color:var(--text-muted);margin-top:4px}

        .fetch-btn{background:none;border:1px solid var(--accent);color:var(--accent);padding:4px 10px;border-radius:4px;font-size:0.75rem;cursor:pointer;font-family:inherit;transition:all 0.15s;white-space:nowrap}
        .fetch-btn:hover{background:var(--accent-dim)}.fetch-btn:disabled{opacity:0.5;cursor:not-allowed}

        .market-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:8px}
        .market-tab{flex:1;padding:7px 0;text-align:center;font-size:0.78rem;background:var(--card);color:var(--text-muted);cursor:pointer;border:none;font-family:inherit;transition:all 0.15s}
        .market-tab:not(:last-child){border-right:1px solid var(--border)}
        .market-tab.active{background:var(--accent-dim);color:var(--accent);font-weight:500}

        .ac-wrap{position:relative}
        .ac-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);max-height:220px;overflow-y:auto;z-index:20;display:none;margin-top:4px;box-shadow:0 12px 32px rgba(0,0,0,0.4)}
        .ac-item{padding:10px 14px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;gap:8px;transition:background 0.1s;border-bottom:1px solid var(--border)}
        .ac-item:last-child{border-bottom:none}.ac-item:hover,.ac-item:active{background:rgba(255,255,255,0.05)}
        .ac-item-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ac-item-code{font-family:'DM Mono',monospace;color:var(--text-muted);font-size:0.78rem;flex-shrink:0}
        .ac-item-tag{font-size:0.65rem;padding:2px 7px;border-radius:10px;flex-shrink:0}
        .ac-tag-a{background:rgba(201,168,76,0.15);color:#c9a84c}.ac-tag-hk{background:rgba(239,68,68,0.12);color:#ef4444}
        .ac-tag-us{background:rgba(59,130,246,0.15);color:#3b82f6}.ac-tag-fund{background:rgba(34,197,94,0.15);color:#22c55e}

        #toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:8px}
        .toast{padding:12px 20px;border-radius:var(--radius-sm);font-size:0.85rem;color:white;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.7s forwards;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:340px}
        .toast-success{background:#16a34a}.toast-error{background:#dc2626}.toast-info{background:#2563eb}
        @keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
        @keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}

        .empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-state .icon{font-size:2.5rem;margin-bottom:16px}.empty-state p{margin-bottom:20px}
        ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

        @media(max-width:900px){
            :root{--bottom-h:64px}.sidebar{display:none}
            .main{margin-left:0;padding:16px 16px calc(64px + env(safe-area-inset-bottom,12px)) 16px}
            .mobile-top{display:block}.bottom-nav{display:block}
            .page-header{margin-bottom:16px}.page-header h2{font-size:1.2rem}
            .page-header-actions{width:100%}.page-header-actions .btn{flex:1;justify-content:center;padding:12px 16px}
            .stats-grid{grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
            .stat-card{padding:14px 16px}.stat-label{font-size:0.72rem;margin-bottom:5px}.stat-value{font-size:1.1rem}.stat-sub{font-size:0.7rem;margin-top:3px}
            .charts-grid{grid-template-columns:1fr;gap:12px;margin-bottom:16px}
            .chart-card{padding:16px}.chart-wrap{height:220px}.chart-wrap-tall{height:200px}
            .table-card{display:none}.mobile-card-list{display:flex}
            .filter-bar{gap:8px}.filter-bar select{padding:10px 12px;font-size:0.82rem;flex:1;min-width:0}
            .accounts-grid{display:none}.snapshot-list{display:none}
            .m-snapshots-wrap{display:flex;flex-direction:column;gap:12px}
            .modal{width:100%;max-width:100%;max-height:100vh;border-radius:16px 16px 0 0;padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));position:fixed;bottom:0;left:0;right:0;transform:translateY(100%)}
            .modal-overlay.show .modal{transform:translateY(0)}
            .modal-overlay{align-items:flex-end;background:rgba(0,0,0,0.5)}
            .form-row{grid-template-columns:1fr;gap:10px}
            .form-group input,.form-group select{padding:12px 14px;font-size:16px}
            .form-actions .btn{flex:1;justify-content:center;padding:14px}
            #toast-container{top:12px;left:12px;right:12px}.toast{max-width:100%}
            .ac-dropdown{max-height:180px}
        }
        @media(min-width:901px){.mobile-card-list{display:none!important}.m-snapshots-wrap{display:none!important}.accounts-grid{display:grid}.snapshot-list{display:flex;flex-direction:column;gap:12px}}
        @media(max-width:500px){.stats-grid{grid-template-columns:1fr 1fr}.m-card-grid{grid-template-columns:1fr 1fr}.m-snapshot-grid{grid-template-columns:1fr 1fr}}
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><h1>资产管家</h1><p>PERSONAL ASSETS</p></div>
    <nav class="sidebar-nav">
        <div class="nav-item active" data-page="dashboard"><span class="icon">📊</span> 总览</div>
        <div class="nav-item" data-page="holdings"><span class="icon">📋</span> 持仓管理</div>
        <div class="nav-item" data-page="accounts"><span class="icon">🏦</span> 账户管理</div>
        <div class="nav-item" data-page="liabilities"><span class="icon">💳</span> 负债管理</div>
        <div class="nav-item" data-page="closed"><span class="icon">✅</span> 清仓记录</div>
        <div class="nav-item" data-page="snapshots"><span class="icon">📸</span> 历史快照</div>
    </nav>
    <div class="sidebar-footer"><div class="sidebar-footer-btns">
        <button class="btn-ghost" onclick="exportData()">📥 导出</button>
        <button class="btn-ghost" onclick="document.getElementById('import-file').click()">📤 导入</button>
        <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
        <button class="btn-ghost danger" onclick="clearAllData()">🗑️</button>
    </div></div>
</aside>

<div class="mobile-top" id="mobile-top"><div class="mobile-top-row"><h1>资产管家</h1><div class="mobile-top-actions"><button class="btn-icon" onclick="showMobileMenu()">⋯</button></div></div></div>

<nav class="bottom-nav" id="bottom-nav"><div class="bottom-nav-inner">
    <div class="bottom-nav-item active" data-page="dashboard"><span class="bi-icon">📊</span>总览</div>
    <div class="bottom-nav-item" data-page="holdings"><span class="bi-icon">📋</span>持仓</div>
    <div class="bottom-nav-item" data-page="accounts"><span class="bi-icon">🏦</span>账户</div>
    <div class="bottom-nav-item" data-page="liabilities"><span class="bi-icon">💳</span>负债</div>
    <div class="bottom-nav-item" data-page="closed"><span class="bi-icon">✅</span>清仓</div>
    <div class="bottom-nav-item" data-page="snapshots"><span class="bi-icon">📸</span>快照</div>
</div></nav>

<div class="main" id="main">

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
        <div class="page-header"><h2>资产总览</h2></div>
        <div class="stats-grid" id="stats-grid"></div>
        <div class="charts-grid">
            <div class="chart-card"><h3>资产分类占比</h3><div class="chart-wrap"><canvas id="chart-category"></canvas></div></div>
            <div class="chart-card"><h3>账户分布</h3><div class="chart-wrap"><canvas id="chart-account"></canvas></div></div>

function fmtMoney(v,compact=false){const sign=v<0?'-':'',a=Math.abs(v);if(compact){if(a>=1e8)return sign+'¥'+(a/1e8).toFixed(2)+'亿';if(a>=1e4)return sign+'¥'+(a/1e4).toFixed(2)+'万'}return sign+'¥'+a.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2})}
function fmtPct(v){return (v>0?'+':'')+v.toFixed(2)+'%'}
function accName(id){const a=state.accounts.find(a=>a.id===id);return a?a.name:'未知'}

function parseMarketCode(storedCode,category){if(!storedCode)return{market:'a',code:''};const c=storedCode.toLowerCase();if(category==='fund')return{market:'fund',code:storedCode};if(c.startsWith('hk'))return{market:'hk',code:storedCode.slice(2)};if(c.startsWith('us'))return{market:'us',code:storedCode.slice(2)};if(c.startsWith('sh'))return{market:'a',code:storedCode.slice(2)};if(c.startsWith('sz'))return{market:'a',code:storedCode.slice(2)};return{market:'a',code:storedCode}}
function buildStoredCode(market,rawCode){if(!rawCode)return'';if(market==='hk')return'hk'+rawCode.padStart(5,'0');if(market==='us')return'us'+rawCode.toUpperCase();if(rawCode.startsWith('6')||rawCode.startsWith('9')||rawCode.startsWith('5'))return'sh'+rawCode;return'sz'+rawCode}

function searchDB(query){if(!query||query.length<1)return[];const q=query.toLowerCase();return STOCK_DB.filter(item=>item.n.toLowerCase().includes(q)||item.c.toLowerCase().includes(q)).slice(0,8)}

function showHoldingModal(id){const h=id?state.holdings.find(x=>x.id===id):null;const isEdit=!!h;const{market:curMarket,code:displayCode}=parseMarketCode(h?.code||'',h?.category||'stock');const showMarketTabs=!h||(h.category!=='fund'&&h.category!=='cash'&&h.category!=='other');

group"><label>成本价 (¥)</label><input type="number" name="costPrice" required step="any" min="0" value="${h?.costPrice||''}"></div></div><div class="form-group"><label>当前价格 (¥)</label><input type="number" name="currentPrice" required step="any" min="0" value="${h?.currentPrice||''}" id="modal-current-price"></div><div class="form-group"><label>备注</label><input type="text" name="note" placeholder="可选" value="${h?.note||''}"></div><div class="form-actions"><button type="button" class="btn btn-secondary" onclick="hideModal()">取消</button><button type="submit" class="btn btn-primary">${isEdit?'保存修改':'添加持仓'}</button></div></form>`);
    setupAutocomplete();
    document.getElementById('holding-form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const cat=fd.get('category'),rawCode=fd.get('code').trim();let finalCode=rawCode;if(cat!=='fund'&&cat!=='cash'&&cat!=='other'&&rawCode){const activeTab=document.querySelector('.market-tab.active');const mkt=activeTab?activeTab.dataset.market:'a';finalCode=buildStoredCode(mkt,rawCode)}const data={accountId:fd.get('accountId'),category:cat,name:fd.get('name').trim(),code:finalCode,shares:parseFloat(fd.get('shares')),costPrice:parseFloat(fd.get('costPrice')),currentPrice:parseFloat(fd.get('currentPrice')),note:fd.get('note').trim()};if(isEdit){const i=state.holdings.findIndex(x=>x.id===id);if(i>=0)state.holdings[i]={...state.holdings[i],...data}}else{state.holdings.push({id:genId(),...data})}saveState();hideModal();renderHoldings();showToast(isEdit?'已更新':'已添加')}}
function selectMarket(m){document.querySelectorAll('.market-tab').forEach(t=>t.classList.remove('active'));document.querySelector(`.market-tab[data-market="${m}"]`).classList.add('active');const ci=document.getElementById('modal-code-input');if(ci)ci.placeholder=m==='hk'?'如：00700':m==='us'?'如：AAPL':'如：600519'}

async function fetchPriceInModal(){const codeInput=document.getElementById('modal-code-input'),catSelect=document.querySelector('#holding-form select[name="category"]'),priceInput=document.getElementById('modal-current-price'),nameInput=document.querySelector('#holding-form input[name="name"]'),btn=document.querySelector('.fetch-btn');const code=codeInput.value.trim();if(!code){showToast('请先输入代码','error');return}const activeTab=document.querySelector('.market-tab.active');const market=activeTab?activeTab.dataset.market:'a';btn.disabled=true;btn.textContent='获取中...';try{if(catSelect.value==='fund'){const d=await fetchFundNav(code);priceInput.value=d.nav;nameInput.value=d.name;showToast(`${d.name} 净值 ${d.nav}`)}else{const d=await fetchStockPrice(code,market);priceInput.value=d.price;nameInput.value=d.name;showToast(`${d.name} ¥${d.price}`)}}catch(err){showToast('获取失败: '+err.message,'error')}finally{btn.disabled=false;btn.textContent='获取价格'}}

// ===================== CLOSE HOLDING =====================
function closeHolding(id){
    const h=state.holdings.find(x=>x.id===id);if(!h)return;
    const cat=CATEGORIES[h.category]||CATEGORIES.other;
    showModal(`<h2>清仓确认</h2><div style="background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:20px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><strong>${h.name}</strong><span class="badge ${cat.badge}">${cat.name}</span></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:0.82rem;color:var(--text-secondary)"><div>持有数量: <span class="mono">${h.shares>1?h.shares.toLocaleString():'-'}</span></div><div>成本价: <span class="mono">${fmtMoney(h.costPrice)}</span></div><div>当前价: <span class="mono">${fmtMoney(h.currentPrice)}</span></div><div>市值: <span class="mono">${fmtMoney(h.shares*h.currentPrice)}</span></div></div></div><form id="close-form"><div class="form-row"><div class="form-group"><label>清仓价格 (¥)</label><input type="number" name="closePrice" required step="any" min="0" value="${h.currentPrice}" id="modal-close-price"></div><div class="form-group"><label>清仓日期</label><input type="date" name="closeDate" required value="${new Date().toISOString().slice(0,10)}"></div></div><div class="form-group"><label>备注</label><input type="text" name="note" placeholder="可选，如：止损/止盈/换仓"></div><div id="close-preview" style="margin-top:16px;padding:14px;border-radius:var(--radius-sm);font-family:'DM Mono',monospace;font-size:0.9rem"></div><div class="form-actions"><button type="button" class="btn btn-secondary" onclick="hideModal()">取消</button><button type="submit" class="btn btn-primary">确认清仓</button></div></form>`);
    const closePriceInput=document.getElementById('modal-close-price'),previewDiv=document.getElementById('close-preview');
    function updatePreview(){const cp=parseFloat(closePriceInput.value)||0;const pnl=(cp-h.costPrice)*h.shares;const pct=h.costPrice>0?((cp-h.costPrice)/h.costPrice*100):0;const bg=pnl>=0?'var(--success-bg)':'var(--danger-bg)';const color=pnl>=0?'var(--success)':'var(--danger)';previewDiv.style.background=bg;previewDiv.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="color:var(--text-secondary)">清仓盈亏</span><span style="color:${color};font-weight:500">${fmtMoney(pnl)}</span></div><div style="display:flex;justify-content:space-between"><span style="color:var(--text-secondary)">收益率</span><span style="color:${color};font-weight:500">${fmtPct(pct)}</span></div>`}
    updatePreview();closePriceInput.addEventListener('input',updatePreview);
    document.getElementById('close-form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const closePrice=parseFloat(fd.get('closePrice'));const closeDate=fd.get('closeDate');const note=fd.get('note').trim();const pnl=(closePrice-h.costPrice)*h.shares;const pnlPct=h.costPrice>0?((closePrice-h.costPrice)/h.costPrice*100):0;
        state.closedPositions.push({id:genId(),name:h.name,code:h.code,category:h.category,accountId:h.accountId,shares:h.shares,costPrice:h.costPrice,closePrice,totalCost:h.shares*h.costPrice,totalRevenue:h.shares*closePrice,pnl,pnlPct,closeDate,note,timestamp:Date.now()});
        state.holdings=state.holdings.filter(x=>x.id!==id);saveState();hideModal();renderHoldings();showToast(`已清仓 ${h.name}，${pnl>=0?'盈利':'亏损'} ${fmtMoney(Math.abs(pnl),true)}`)}
}

// ===================== CLOSED POSITIONS =====================
function renderClosed(){
    const list=(state.closedPositions||[]).sort((a,b)=>b.closeDate.localeCompare(a.closeDate));
    const totalPnl=list.reduce((s,c)=>s+c.pnl,0),totalCostAll=list.reduce((s,c)=>s+c.totalCost,0),avgPct=totalCostAll>0?(totalPnl/totalCostAll*100):0;
    const body=document.getElementById('closed-body');
    if(!list.length){body.innerHTML='<tr><td colspan="14" class="text-muted" style="text-align:center;padding:40px">暂无清仓记录，在持仓管理中点击"清仓"来记录</td></tr>'}
    else{body.innerHTML=`<tr style="background:rgba(255,255,255,0.02)"><td colspan="7" style="padding:12px 16px;font-weight:500">合计</td><td class="mono" style="padding:12px 16px">${fmtMoney(totalCostAll)}</td><td class="mono" style="padding:12px 16px">${fmtMoney(totalCostAll+totalPnl)}</td><td class="mono ${totalPnl>=0?'text-success':'text-danger'}" style="padding:12px 16px;font-weight:500">${fmtMoney(totalPnl)}</td><td class="mono ${avgPct>=0?'text-success':'text-danger'}" style="padding:12px 16px;font-weight:500">${fmtPct(avgPct)}</td><td colspan="3" style="padding:12px 16px;color:var(--text-muted)">${list.length} 笔交易</td></tr>`+list.map(c=>{const cat=CATEGORIES[c.category]||CATEGORIES.other;return`<tr><td><strong>${c.name}</strong></td><td class="mono text-muted">${c.code||'-'}</td><td><span class="badge ${cat.badge}">${cat.name}</span></td><td class="text-muted">${accName(c.accountId)}</td><td class="mono">${c.shares>1?c.shares.toLocaleString():'-'}</td><td class="mono">${fmtMoney(c.costPrice)}</td><td class="mono">${fmtMoney(c.closePrice)}</td><td class="mono">${fmtMoney(c.totalCost)}</td><td class="mono">${fmtMoney(c.totalRevenue)}</td><td class="mono ${c.pnl>=0?'text-success':'text-danger'}">${fmtMoney(c.pnl)}</td><td class="mono ${c.pnlPct>=0?'text-success':'text-danger'}">${fmtPct(c.pnlPct)}</td><td class="mono">${c.closeDate}</td><td class="text-muted">${c.note||'-'}</td><td><button class="btn-ghost danger" onclick="deleteClosed('${c.id}')">删除</button></td></tr>`}).join('')}
    const mc=document.getElementById('closed-mobile-cards');
    if(!list.length){mc.innerHTML='<div class="empty-state"><div class="icon">✅</div><p>暂无清仓记录</p><p class="text-muted" style="font-size:0.82rem">在持仓管理中点击"清仓"来记录</p></div>';return}
    mc.innerHTML=`<div class="m-card" style="border-color:var(--accent);background:var(--accent-dim)"><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-weight:500">历史累计收益</span><span class="mono ${totalPnl>=0?'text-success':'text-danger'}" style="font-size:1.2rem;font-weight:500">${fmtMoney(totalPnl,true)}</span></div><div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px">${list.length} 笔清仓 · 综合收益率 ${fmtPct(avgPct)}</div></div>`+list.map(c=>{const cat=CATEGORIES[c.category]||CATEGORIES.other;return`<div class="m-card"><div class="m-card-top"><div><div class="m-card-name">${c.name}</div><div class="m-card-sub">${accName(c.accountId)} · ${c.closeDate}${c.note?' · '+c.note:''}</div></div><span class="badge ${cat.badge}">${cat.name}</span></div><div class="m-card-grid"><div class="m-card-field"><div class="label">成本价</div><div class="value">${fmtMoney(c.costPrice)}</div></div><div class="m-card-field"><div class="label">清仓价</div><div class="value">${fmtMoney(c.closePrice)}</div></div><div class="m-card-field"><div class="label">盈亏</div><div class="value ${c.pnl>=0?'text-success':'text-danger'}">${fmtMoney(c.pnl)}</div></div><div class="m-card-field"><div class="label">收益率</div><div class="value ${c.pnlPct>=0?'text-success':'text-danger'}">${fmtPct(c.pnlPct)}</div></div></div><div class="m-card-actions"><button class="btn btn-danger btn-block" onclick="deleteClosed('${c.id}')">删除记录</button></div></div>`}).join('');
}
function deleteClosed(id){if(!confirm('确定删除此清仓记录？'))return;state.closedPositions=(state.closedPositions||[]).filter(c=>c.id!==id);saveState();renderClosed();showToast('已删除')}

// ===================== ACCOUNTS =====================
function renderAccounts(){const grid=document.getElementById('accounts-grid'),mc=document.getElementById('accounts-mobile-cards');if(!state.accounts.length){grid.innerHTML=mc.innerHTML='<div class="empty-state"><div class="icon">🏦</div><p>暂无账户</p></div>';return}const items=state.accounts.map(acc=>{const hs=state.holdings.filter(h=>h.accountId===acc.id);return{acc,hs,tv:hs.reduce((s,h)=>s+h.shares*h.currentPrice,0)}});grid.innerHTML=items.map(({acc,hs,tv})=>`<div class="account-card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span style="font-weight:500;font-size:1rem">${acc.name}</span><span class="badge badge-other">${ACCOUNT_TYPES[acc.type]||acc.type}</span></div><div style="font-family:'DM Mono',monospace;font-size:1.35rem;font-weight:500;margin-bottom:8px">${fmtMoney(tv,true)}</div><div style="font-size:0.78rem;color:var(--text-muted)">${hs.length} 项持仓</div><div style="margin-top:14px;display:flex;gap:8px"><button class="btn-ghost" onclick="showAccountModal('${acc.id}')">编辑</button><button class="btn-ghost danger" onclick="deleteAccount('${acc.id}')">删除</button></div></div>`).join('');mc.innerHTML=items.map(({acc,hs,tv})=>`<div class="m-account-card"><div class="m-account-top"><span class="m-account-name">${acc.name}</span><span class="badge badge-other">${ACCOUNT_TYPES[acc.type]||acc.type}</span></div><div class="m-account-value">${fmtMoney(tv,true)}</div><div class="m-account-count">${hs.length} 项持仓</div><div class="m-account-actions"><button class="btn btn-secondary" onclick="showAccountModal('${acc.id}')">编辑</button><button class="btn btn-danger" onclick="deleteAccount('${acc.id}')">删除</button></div></div>`).join('')}
function showAccountModal(id){const acc=id?state.accounts.find(a=>a.id===id):null;const isEdit=!!acc;showModal(`<h2>${isEdit?'编辑账户':'添加账户'}</h2><form id="account-form"><div class="form-group"><label>账户名称</label><input type="text" name="name" required placeholder="如：华泰证券" value="${acc?.name||''}"></div><div class="form-group"><label>账户类型</label><select name="type" required>${Object.entries(ACCOUNT_TYPES).map(([k,v])=>`<option value="${k}" ${acc?.type===k?'selected':''}>${v}</option>`).join('')}</select></div><div class="form-actions"><button type="button" class="btn btn-secondary" onclick="hideModal()">取消</button><button type="submit" class="btn btn-primary">${isEdit?'保存':'添加'}</button></div></form>`);document.getElementById('account-form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const data={name:fd.get('name').trim(),type:fd.get('type')};if(isEdit){const i=state.accounts.findIndex(a=>a.id===id);if(i>=0)state.accounts[i]={...state.accounts[i],...data}}else{state.accounts.push({id:genId(),...data})}saveState();hideModal();renderAccounts();showToast(isEdit?'已更新':'已添加')}}
function deleteAccount(id){if(state.holdings.some(h=>h.accountId===id)){showToast('该账户下有持仓','error');return}if(!confirm('确定删除？'))return;state.accounts=state.accounts.filter(a=>a.id!==id);saveState();renderAccounts();showToast('已删除')}

// ===================== LIABILITIES =====================
function renderLiabilities(){const body=document.getElementById('liabilities-body'),mc=document.getElementById('liabilities-mobile-cards');if(!state.liabilities.length){body.innerHTML='<tr><td colspan="7" class="text-muted" style="text-align:center;padding:40px">暂无负债</td></tr>';mc.innerHTML='<div class="empty-state"><div class="icon">💳</div><p>暂无负债</p></div>';return}body.innerHTML=state.liabilities.map(l=>`<tr><td><strong>${l.name}</strong></td><td class="text-muted">${accName(l.accountId)}</td><td class="mono">${fmtMoney(l.amount)}</td><td class="mono">${l.interestRate}%</td><td class="mono">${l.monthlyPayment?fmtMoney(l.monthlyPayment):'-'}</td><td class="text-muted">${l.note||'-'}</td><td><button class="btn-ghost" onclick="showLiabilityModal('${l.id}')">编辑</button> <button class="btn-ghost danger" onclick="deleteLiability('${l.id}')">删除</button></td></tr>`).join('');mc.innerHTML=state.liabilities.map(l=>`<div class="m-card"><div class="m-card-top"><div><div class="m-card-name">${l.name}</div><div class="m-card-sub">${accName(l.accountId)}${l.note?' · '+l.note:''}</div></div></div><div class="m-card-grid"><div class="m-card-field"><div class="label">金额</div><div class="value">${fmtMoney(l.amount,true)}</div></div><div class="m-card-field"><div class="label">年利率</div><div class="value">${l.interestRate}%</div></div><div class="m-card-field"><div class="label">月供</div><div class="value">${l.monthlyPayment?fmtMoney(l.monthlyPayment):'-'}</div></div></div><div class="m-card-actions"><button class="btn btn-secondary" onclick="showLiabilityModal('${l.id}')">编辑</button><button class="btn btn-danger" onclick="deleteLiability('${l.id}')">删除</button></div></div>`).join('')}
function showLiabilityModal(id){const l=id?state.liabilities.find(x=>x.id===id):null;const isEdit=!!l;showModal(`<h2>${isEdit?'编辑负债':'添加负债'}</h2><form id="liability-form"><div class="form-row"><div class="form-group"><label>名称</label><input type="text" name="name" required placeholder="如：住房贷款" value="${l?.name||''}"></div><div class="form-group"><label>关联账户</label><select name="accountId" required>${state.accounts.map(a=>`<option value="${a.id}" ${l?.accountId===a.id?'selected':''}>${a.name}</option>`).join('')}</select></div></div><div class="form-row"><div class="form-group"><label>负债金额 (¥)</label><input type="number" name="amount" required step="any" min="0" value="${l?.amount||''}"></div><div class="form-group"><label>年利率 (%)</label><input type="number" name="interestRate" step="any" min="0" value="${l?.interestRate||''}"></div></div><div class="form-row"><div class="form-group"><label>月供 (¥)</label><input type="number" name="monthlyPayment" step="any" min="0" value="${l?.monthlyPayment||''}"></div><div class="form-group"><label>备注</label><input type="text" name="note" value="${l?.note||''}"></div></div><div class="form-actions"><button type="button" class="btn btn-secondary" onclick="hideModal()">取消</button><button type="submit" class="btn btn-primary">${isEdit?'保存':'添加'}</button></div></form>`);document.getElementById('liability-form').onsubmit=e=>{e.preventDefault();const fd=new FormData(e.target);const data={accountId:fd.get('accountId'),name:fd.get('name').trim(),amount:parseFloat(fd.get('amount')),interestRate:parseFloat(fd.get('interestRate'))||0,monthlyPayment:parseFloat(fd.get('monthlyPayment'))||0,note:fd.get('note').trim()};if(isEdit){const i=state.liabilities.findIndex(x=>x.id===id);if(i>=0)state.liabilities[i]={...state.liabilities[i],...data}}else{state.liabilities.push({id:genId(),...data})}saveState();hideModal();renderLiabilities();showToast(isEdit?'已更新':'已添加')}}
function deleteLiability(id){if(!confirm('确定删除？'))return;state.liabilities=state.liabilities.filter(l=>l.id!==id);saveState();renderLiabilities();showToast('已删除')}

// ===================== SNAPSHOTS =====================
function renderSnapshots(){const sorted=[...state.snapshots].sort((a,b)=>b.date.localeCompare(a.date));const list=document.getElementById('snapshot-list'),mc=document.getElementById('snapshot-mobile-cards');if(!sorted.length){const e='<div class="empty-state"><div class="icon">📸</div><p>暂无快照</p><p class="text-muted" style="font-size:0.82rem">保存快照追踪净资产变化</p></div>';list.innerHTML=e;mc.innerHTML=e;return}list.innerHTML=sorted.map((s,i)=>{const prev=sorted[i+1],ch=prev?s.netWorth-prev.netWorth:0,chP=prev&&prev.netWorth!==0?(ch/Math.abs(prev.netWorth)*100):0;return`<div class="snapshot-item"><div class="snapshot-info"><h4>${s.date}${s.note?' — '+s.note:''}</h4><p>${s.holdingCount||0}项持仓 · ${s.liabilityCount||0}项负债</p></div><div style="display:flex;gap:28px;align-items:center"><div style="text-align:right"><div style="font-size:0.72rem;color:var(--text-muted)">净资产</div><div class="mono ${s.netWorth>=0?'text-success':'text-danger'}" style="font-size:0.95rem;font-weight:500">${fmtMoney(s.netWorth,true)}</div></div>${prev?`<div style="text-align:right"><div style="font-size:0.72rem;color:var(--text-muted)">较上次</div><div class="mono ${ch>=0?'text-success':'text-danger'}" style="font-size:0.95rem;font-weight:500">${fmtPct(chP)}</div></div>`:''}<button class="btn-ghost danger" onclick="deleteSnapshot('${s.id}')">删除</button></div></div>`}).join('');mc.innerHTML=sorted.map((s,i)=>{const prev=sorted[i+1],ch=prev?s.netWorth-prev.netWorth:0,chP=prev&&prev.netWorth!==0?(ch/Math.abs(prev.netWorth)*100):0;return`<div class="m-snapshot"><div class="m-snapshot-title">${s.date}${s.note?' — '+s.note:''}</div><div class="m-snapshot-sub">${s.holdingCount||0}项持仓 · ${s.liabilityCount||0}项负债</div><div class="m-snapshot-grid"><div class="sf"><div class="label">总资产</div><div class="value">${fmtMoney(s.totalAssets,true)}</div></div><div class="sf"><div class="label">净资产</div><div class="value ${s.netWorth>=0?'text-success':'text-danger'}">${fmtMoney(s.netWorth,true)}</div></div>${prev?`<div class="sf"><div class="label">较上次</div><div class="value ${ch>=0?'text-success':'text-danger'}">${fmtPct(chP)}</div></div>`:''}</div><div class="m-snapshot-del"><button class="btn-ghost danger" onclick="deleteSnapshot('${s.id}')">删除</button></div></div>`}).join('')}
function saveSnapshot(){const today=new Date().toISOString().slice(0,10),ta=totalAssets(),tl=totalLiabilities();const note=prompt('备注（可选）：','');state.snapshots.push({id:genId(),date:today,note:note||'',totalAssets:ta,totalLiabilities:tl,netWorth:ta-tl,holdingCount:state.holdings.length,liabilityCount:state.liabilities.length});saveState();renderSnapshots();showToast('快照已保存: '+today)}
function deleteSnapshot(id){if(!confirm('确定删除？'))return;state.snapshots=state.snapshots.filter(s=>s.id!==id);saveState();renderSnapshots();showToast('已删除')}

// ===================== PRICE FETCHING =====================
async function fetchFundNav(code){return new Promise((resolve,reject)=>{const old=window.jsonpgz;const s=document.createElement('script');const t=setTimeout(()=>{cl();reject(new Error('超时'))},8000);function cl(){clearTimeout(t);s.remove();if(old)window.jsonpgz=old;else delete window.jsonpgz}window.jsonpgz=d=>{cl();if(d&&d.dwjz)resolve({name:d.name,code:d.fundcode,nav:parseFloat(d.dwjz)});else reject(new Error('数据格式错误'))};s.src=`https://fundgz.1234567.com.cn/js/${code}.js?rt=${Date.now()}`;s.onerror=()=>{cl();reject(new Error('网络请求失败'))};document.head.appendChild(s)})}
async function fetchStockPrice(code,market){let fullCode;if(market==='hk'){fullCode='hk'+code.replace(/^hk/i,'').padStart(5,'0')}else if(market==='us'){fullCode='us'+code.replace(/^us/i,'').toLowerCase()}else{const c=code.toLowerCase();if(c.startsWith('sh')||c.startsWith('sz')){fullCode=c}else{fullCode=(c.startsWith('6')||c.startsWith('9')||c.startsWith('5'))?'sh'+c:'sz'+c}}return new Promise((resolve,reject)=>{const s=document.createElement('script');const t=setTimeout(()=>{s.remove();reject(new Error('超时'))},8000);s.src=`https://qt.gtimg.cn/q=${fullCode}`;s.onload=()=>{clearTimeout(t);const raw=window['v_'+fullCode];s.remove();if(raw&&typeof raw==='string'&&raw.length>10){const p=raw.split('~');if(p.length>5)resolve({name:p[1],code:p[2],price:parseFloat(p[3])});else reject(new Error('解析失败'))}else reject(new Error('无数据，请检查代码'))};s.onerror=()=>{clearTimeout(t);s.remove();reject(new Error('网络请求失败'))};document.head.appendChild(s)})}

// ===================== IMPORT/EXPORT =====================
function exportData(){const b=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),url=URL.createObjectURL(b),a=document.createElement('a');a.href=url;a.download=`资产管家_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(url);showToast('已导出')}
function importData(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.accounts&&d.holdings){state=d;if(!state.closedPositions)state.closedPositions=[];saveState();navigate('dashboard');showToast('导入成功')}else showToast('无效文件','error')}catch(err){showToast('解析失败','error')}};r.readAsText(f);e.target.value=''}
function clearAllData(){if(!confirm('确定清空所有数据？'))return;if(!confirm('再次确认？'))return;localStorage.removeItem('asset-tracker-data');loadDemoData();navigate('dashboard');showToast('已重置','info')}

// ===================== INIT =====================
document.querySelectorAll('.nav-item').forEach(i=>i.addEventListener('click',()=>navigate(i.dataset.page)));
document.querySelectorAll('.bottom-nav-item').forEach(i=>i.addEventListener('click',()=>navigate(i.dataset.page)));
let resizeTimer;window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{const p=document.querySelector('.page.active');if(p){const pg=p.id.replace('page-','');if(pg==='dashboard')renderDashboard()}},300)});
loadState();renderDashboard();
</script>
